<script>
function downloadSVG() {
  const svg = document.getElementById('diagram')
  const serializer = new XMLSerializer()
  let svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + serializer.serializeToString(svg)
  const blob = new Blob([svgStr], { type: 'image/svg+xml' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'lettuce-eat-architecture.svg'
  a.click()
  URL.revokeObjectURL(a.href)
}

function downloadPNG() {
  const svg = document.getElementById('diagram')
  const scale = 2
  const canvas = document.createElement('canvas')
  canvas.width = 960 * scale
  canvas.height = 780 * scale
  const ctx = canvas.getContext('2d')
  ctx.scale(scale, scale)
  ctx.fillStyle = '#f8f7f4'
  ctx.fillRect(0, 0, 960, 780)
  const serializer = new XMLSerializer()
  const svgStr = serializer.serializeToString(svg)
  const blob = new Blob([svgStr], { type: 'image/svg+xml' })
  const url = URL.createObjectURL(blob)
  const img = new Image()
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 960, 780)
    URL.revokeObjectURL(url)
    const a = document.createElement('a')
    a.href = canvas.toDataURL('image/png')
    a.download = 'lettuce-eat-architecture.png'
    a.click()
  }
  img.src = url
}
</script>
